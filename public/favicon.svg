  <ellipse cx="50" cy="27" rx="13" ry="11" fill="#2d5a27"/>
  <!-- Wing divide line -->
  <line x1="50" y1="30" x2="50" y2="82" stroke="#1a3a16" stroke-width="2"/>
  <!-- Wing pattern dots -->
  <circle cx="42" cy="48" r="3" fill="#1a3a16"/>
  <circle cx="58" cy="48" r="3" fill="#1a3a16"/>
  <circle cx="41" cy="62" r="2.5" fill="#1a3a16"/>
  <circle cx="59" cy="62" r="2.5" fill="#1a3a16"/>
  <!-- Eyes -->
  <circle cx="44" cy="24" r="3" fill="#fff"/>
  <circle cx="56" cy="24" r="3" fill="#fff"/>
  <circle cx="44" cy="24" r="1.5" fill="#111"/>
  <circle cx="56" cy="24" r="1.5" fill="#111"/>
  <!-- Antennae -->
  <line x1="44" y1="17" x2="34" y2="5" stroke="#2d5a27" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="17" x2="66" y2="5" stroke="#2d5a27" stroke-width="2" stroke-linecap="round"/>
  <circle cx="34" cy="5" r="2.5" fill="#2d5a27"/>
