  <!-- Legs left -->
  <line x1="30" y1="48" x2="12" y2="42" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="29" y1="58" x2="10" y2="57" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="68" x2="14" y2="75" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="70" y1="48" x2="88" y2="42" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="71" y1="58" x2="90" y2="57" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="69" y1="68" x2="86" y2="75" stroke="#2d5a27" stroke-width="2.5" stroke-linecap="round"/>
